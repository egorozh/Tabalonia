name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore Tabalonia.sln

      - name: Build
        run: dotnet build Tabalonia.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test Tabalonia.Tests/Tabalonia.Tests.csproj --no-build --configuration Release --logger "console;verbosity=normal"
